# Build and publish a Docker image whenever a version tag is pushed.
#
#   git tag v1.2.3 && git push origin v1.2.3
#
# The image lands in GitHub Container Registry as
#   ghcr.io/<owner>/<repo>:1.2.3   (+ :1.2, :1, :latest)
#
# Fast subsequent builds come from two caches that persist between runs:
#   * Docker layers  — cache-from/to type=gha, so the slow apt-get + PHP
#     extension layers are reused and only changed layers rebuild.
#   * Composer deps  — keyed on composer.lock, so `composer install` is a
#     no-op unless dependencies actually change.
name: release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read
  packages: write        # push to GHCR with the built-in GITHUB_TOKEN — no secrets to set

jobs:
  image:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # vendor/ is installed here, not inside `docker build`: the Dockerfile
      # COPYs it in (it is offline by design). CI has working DNS, so a plain
      # composer install is all it takes — and ramsey/composer-install caches
      # it on composer.lock, so this is instant when deps are unchanged.
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          tools: composer:v2
          coverage: none

      - uses: ramsey/composer-install@v3
        with:
          composer-options: '--no-dev --prefer-dist --optimize-autoloader'

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Derive image tags + OCI labels from the git tag (semver-aware).
      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=ref,event=tag
            type=raw,value=latest

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # The whole point of the fast-rebuild ask: pull every reusable layer
          # from GitHub's Actions cache, and write them all back (mode=max
          # caches intermediate stages too, not just the final image).
          cache-from: type=gha
          cache-to: type=gha,mode=max
